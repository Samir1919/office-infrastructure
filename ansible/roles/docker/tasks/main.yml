---
- name: Verify supported operating system
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] == 'Ubuntu'
    fail_msg: Docker role supports Ubuntu hosts only.

- name: Install Docker repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create Docker APT keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install Docker official signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: '0644'

- name: Verify Docker repository package index is reachable
  ansible.builtin.uri:
    url: "https://download.docker.com/linux/ubuntu/dists/{{ ansible_facts['distribution_release'] }}/stable/binary-{{ docker_apt_arch }}/Packages.gz"
    method: HEAD
    status_code: 200
    return_content: false
  check_mode: false

- name: Configure Docker official APT repository
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - https://download.docker.com/linux/ubuntu
    suites:
      - "{{ ansible_facts['distribution_release'] }}"
    components:
      - stable
    architectures:
      - "{{ docker_apt_arch }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present

- name: Refresh APT cache after configuring Docker repository
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
  check_mode: false

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
  when: not ansible_check_mode

- name: Add approved users to Docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
